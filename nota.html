<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Nota Laundry</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    max-width:500px;
    margin:auto;
    padding:20px;
}

.nota{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.title{
    text-align:center;
    margin-bottom:20px;
}

.title h2{
    color:#2196F3;
}

.row{
    margin-bottom:12px;
    line-height:1.5;
}

.label{
    font-weight:bold;
}

.status{
    display:inline-block;
    padding:8px 12px;
    border-radius:8px;
    background:#4CAF50;
    color:white;
}

.btn{
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#2196F3;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.not-found{
    text-align:center;
    color:red;
    padding:20px;
}

</style>
</head>
<body>

<div class="nota">

    <div class="title">
        <h2>🧺 Laundry Digital</h2>
        <p>Nota Digital</p>
    </div>

    <div id="content">
        Memuat data...
    </div>

    <button
        class="btn"
        onclick="window.print()">
        🖨 Cetak Nota
    </button>

</div>

<script>

const params =
new URLSearchParams(window.location.search);

const invoice =
params.get("invoice");

const laundries =
JSON.parse(
    localStorage.getItem("laundries")
) || [];

const item =
laundries.find(
    data => data.invoice === invoice
);

const content =
document.getElementById("content");

if(!item){

    content.innerHTML = `
        <div class="not-found">
            Data nota tidak ditemukan
        </div>
    `;

}else{

    content.innerHTML = `

        <div class="row">
            <span class="label">
                Nomor Nota:
            </span><br>
            ${item.invoice}
        </div>

        <div class="row">
            <span class="label">
                Tanggal:
            </span><br>
            ${item.date}
        </div>

        <div class="row">
            <span class="label">
                Nama Pelanggan:
            </span><br>
            ${item.name}
        </div>

        <div class="row">
            <span class="label">
                Nomor HP:
            </span><br>
            ${item.phone || '-'}
        </div>

        <div class="row">
            <span class="label">
                Layanan:
            </span><br>
            ${item.service}
        </div>

        <div class="row">
            <span class="label">
                Berat:
            </span><br>
            ${item.weight} Kg
        </div>

        <div class="row">
            <span class="label">
                Total:
            </span><br>
            Rp${item.total.toLocaleString('id-ID')}
        </div>

        <div class="row">
            <span class="label">
                Status:
            </span><br>
            <span class="status">
                ${item.status}
            </span>
        </div>

    `;
}

</script>

</body>
</html>
