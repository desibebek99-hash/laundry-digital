<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard Laundry</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    max-width:800px;
    margin:auto;
    padding:15px;
}

.header{
    background:#2196F3;
    color:white;
    text-align:center;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

.menu{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.menu a{
    flex:1;
    text-align:center;
    text-decoration:none;
    background:#4CAF50;
    color:white;
    padding:12px;
    border-radius:10px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.value{
    font-size:32px;
    font-weight:bold;
    color:#2196F3;
    margin-top:10px;
}

.filter-box{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.filter-box label{
    display:block;
    margin-top:10px;
    margin-bottom:5px;
    font-weight:bold;
}

.filter-box input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    margin-bottom:10px;
    box-sizing:border-box;
}

.filter-box button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#2196F3;
    color:white;
    cursor:pointer;
}

</style>
</head>
<body>

<div class="header">
    <h1>Dashboard Laundry</h1>
</div>

<div class="menu">
    <a href="index.html">Laundry Baru</a>
    <a href="list.html">Daftar Laundry</a>
</div>
<div class="filter-box">

    <label>Dari Tanggal</label>
    <input type="date" id="dateFrom">

    <label>Sampai Tanggal</label>
    <input type="date" id="dateTo">

    <button onclick="loadDashboard()">
        Filter
    </button>

</div>
<div class="card">
    <h3>Total Transaksi</h3>
    <div class="value" id="totalTransaksi">0</div>
</div>

<div class="card">
    <h3>Total Berat (Kg)</h3>
    <div class="value" id="totalKg">0</div>
</div>

<div class="card">
    <h3>Total Pendapatan</h3>
    <div class="value" id="totalPendapatan">Rp0</div>
</div>

<div class="card">
    <h3>Laundry Belum Diambil</h3>
    <div class="value" id="belumDiambil">0</div>
</div>

<script>

const laundries =
JSON.parse(
localStorage.getItem("laundries")
) || [];

function loadDashboard(){

const dateFrom =
document.getElementById("dateFrom").value;

const dateTo =
document.getElementById("dateTo").value;

let totalTransaksi = 0;
let totalKg = 0;
let totalPendapatan = 0;
let belumDiambil = 0;

laundries.forEach(item => {

   const itemDate =
   item.dateISO ||
   convertDate(item.date);
    
    if(dateFrom && itemDate < dateFrom){
        return;
    }

    if(dateTo && itemDate > dateTo){
        return;
    }

    totalTransaksi++;

    totalKg +=
    parseFloat(item.weight || 0);

    totalPendapatan +=
    parseInt(item.total || 0);

    if(item.status !== "Diambil"){
        belumDiambil++;
    }

});

document.getElementById(
    "totalTransaksi"
).innerHTML =
totalTransaksi;

document.getElementById(
    "totalKg"
).innerHTML =
totalKg;

document.getElementById(
    "totalPendapatan"
).innerHTML =
"Rp" +
totalPendapatan.toLocaleString("id-ID");

document.getElementById(
    "belumDiambil"
).innerHTML =
belumDiambil;

}
function convertDate(dateStr){

    if(!dateStr) return "";

    const parts = dateStr.split("/");

    if(parts.length !== 3){
        return "";
    }

    return (
        parts[2] + "-" +
        parts[1].padStart(2,"0") + "-" +
        parts[0].padStart(2,"0")
    );

}
loadDashboard();

</script>

</body>
</html>
